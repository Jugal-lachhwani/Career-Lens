# ============================================================
# CareerLens — Nginx reverse proxy configuration
# Serves the frontend at / and proxies /api/* to FastAPI at :8000
# ============================================================

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---- Logging -------------------------------------------------------
    log_format  main  '$remote_addr - $request [$time_local] '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';
    access_log /var/log/nginx/access.log  main;
    error_log  /var/log/nginx/error.log   warn;

    # ---- Performance ---------------------------------------------------
    sendfile            on;
    keepalive_timeout   65;
    gzip                on;
    gzip_types          text/plain text/css application/json
                        application/javascript text/xml application/xml
                        application/xml+rss text/javascript;

    # ---- Rate limiting -------------------------------------------------
    # 10 req/s per IP; burst up to 30 before returning 429
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # ---- Upstream (FastAPI) -------------------------------------------
    upstream careerlens_api {
        server api:8000;
        keepalive 32;
    }

    # ================================================================
    # HTTP server  (port 80)
    # In production: redirect everything to HTTPS.
    # In local dev:  serve directly so you don't need TLS.
    # ================================================================
    server {
        listen 80;
        server_name _;              # matches any hostname in local dev

        # ---- Frontend static files ---------------------------------
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;   # SPA fallback
        }

        # ---- API proxy ---------------------------------------------
        location /api/ {
            limit_req zone=api_limit burst=30 nodelay;

            # Strip /api prefix before forwarding
            rewrite ^/api/(.*) /$1 break;

            proxy_pass         http://careerlens_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";      # keep-alive

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Long timeout for Apify + LLM calls (job search)
            proxy_read_timeout    300s;
            proxy_connect_timeout  75s;
            proxy_send_timeout    120s;

            # Resume PDF upload limit
            client_max_body_size 10M;
        }

        # ---- Health (no rate limit, used by Docker healthcheck) ----
        location = /health {
            proxy_pass http://careerlens_api/health;
        }

        # ---- Docs (Swagger UI) -------------------------------------
        location /docs {
            proxy_pass http://careerlens_api/docs;
        }
        location /openapi.json {
            proxy_pass http://careerlens_api/openapi.json;
        }

        # ---- Security headers --------------------------------------
        add_header X-Frame-Options        "SAMEORIGIN"   always;
        add_header X-Content-Type-Options "nosniff"       always;
        add_header X-XSS-Protection       "1; mode=block" always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    }

    # ================================================================
    # HTTPS server  (port 443) — uncomment after running certbot
    # ================================================================
    # server {
    #     listen 443 ssl http2;
    #     server_name careerlens.yourdomain.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/careerlens.yourdomain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/careerlens.yourdomain.com/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     # Redirect HTTP → HTTPS (add a second server block on port 80 that just returns 301)
    #
    #     location / {
    #         root  /usr/share/nginx/html;
    #         index index.html;
    #         try_files $uri $uri/ /index.html;
    #     }
    #
    #     location /api/ {
    #         limit_req zone=api_limit burst=30 nodelay;
