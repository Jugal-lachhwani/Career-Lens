<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerLens Chatbot</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="careerlens.css">
</head>
<body>
    <div class="container">
        <header class="header careerlens-header">
            <h1>CareerLens Chatbot</h1>
            <p class="subtitle">AI career guide using Module 1 (job search + resume match) and Module 2 (analytics)</p>
        </header>

        <nav class="nav-tabs">
            <a class="tab-link" href="index.html">Job Search Module</a>
            <a class="tab-link" href="dashboard.html">Analytics Module</a>
            <a class="tab-link active-link" href="careerlens.html">CareerLens</a>
        </nav>

        <section class="chat-layout">
            <aside class="chat-sidebar">
                <button id="newChatBtn" class="btn btn-primary new-chat-btn">+ New Chat</button>
                <h3>History</h3>
                <div id="sessionList" class="session-list"></div>
            </aside>

            <section class="chat-main">
                <div id="chatMessages" class="chat-messages">
                    <div class="message assistant">
                        <div class="bubble">Ask me anything about your career path. I use analytics + live job matching tools when needed.</div>
                    </div>
                </div>

                <form id="careerChatForm" class="chat-composer">
                    <div class="form-row two-col">
                        <div>
                            <label for="careerLiveJobQuery">Live Job Query (Optional)</label>
                            <input
                                id="careerLiveJobQuery"
                                name="live_job_query"
                                type="text"
                                placeholder="Example: Find AI Engineer jobs in Bangalore"
                            />
                        </div>
                        <div>
                            <label for="careerResume">Resume PDF (Optional)</label>
                            <input id="careerResume" name="resume" type="file" accept=".pdf" />
                        </div>
                    </div>

                    <div class="form-row inline-row">
                        <input id="careerForceLive" name="force_live_jobs" type="checkbox" />
                        <label for="careerForceLive">Force live jobs + resume matching flow</label>
                    </div>

                    <textarea
                        id="careerQuestion"
                        name="question"
                        rows="3"
                        placeholder="Type your message..."
                        required
                    ></textarea>

                    <div class="composer-actions">
                        <button id="careerSendBtn" type="submit" class="btn btn-primary">Send</button>
                    </div>
                </form>

                <div id="careerChatLoading" class="careerlens-loading" style="display:none;">CareerLens is thinking...</div>
                <div id="careerChatError" class="error-message" style="display:none;"></div>
            </section>
        </section>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
    <script src="careerlens.js?v=2"></script>
</body>
</html>
